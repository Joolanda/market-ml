version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: crypto_api
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: crypto_frontend
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
