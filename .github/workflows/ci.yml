name: CI

on:
  push:
    branches: [ "main", "feature/cloud-skeleton" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint
        run: |
          echo "Linting placeholder"

      - name: Test
        run: |
          echo "Tests placeholder"

      - name: Build Docker images
        run: |
          docker build -f docker/Dockerfile.api -t crypto-api .
          docker build -f docker/Dockerfile.streamlit -t crypto-frontend .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker tag crypto-api:latest ${{ steps.login-ecr.outputs.registry }}/crypto-api:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/crypto-api:latest

      - name: Build and push frontend image
        run: |
          docker tag crypto-frontend:latest ${{ steps.login-ecr.outputs.registry }}/crypto-frontend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/crypto-frontend:latest
